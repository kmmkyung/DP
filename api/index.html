<!-- @format -->

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- css -->
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./index.css" />
    <!-- js -->
    <script src="./index.js"></script>
    <title>api</title>
  </head>
  <body>
    <h3>API 호출 링크</h3>
    <a href="#" class="apiLink">code=a 호출</a><br />
    <a href="#" class="apiLink">code=b 호출</a><br />
    <a href="#" class="apiLink">code=c 호출</a><br />

    <pre id="result"></pre>

    <script>
      const links = document.querySelectorAll(".apiLink");
      const resultEl = document.getElementById("result");

      links.forEach((link) => {
        link.addEventListener("click", (e) => {
          e.preventDefault(); // 링크 이동 막기
          const url = "https://kmmkyung.github.io/DP/api/text.json";

          const apiUrl = fetch(url)
            .then((response) => {
              if (!response.ok)
                throw new Error("네트워크 응답 에러: " + response.status);
              return response.json();
            })
            .then((data) => {
              console.log(data);
              resultEl.textContent = JSON.stringify(data);
            })
            .catch((error) => {
              console.error("API 호출 실패:", error);
            });
        });
      });
    </script>
  </body>
</html>
