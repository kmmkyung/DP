<!-- @format -->

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- css -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/index.css" />
    <!-- js -->
    <script src="js/index.js"></script>
  </head>
  <body>
    <main id="main">
      <section class="sec sec1">
        <div class="container">
          <div class="innerWrap">
            <div class="titleArea">
              <h2 class="title title1">일상을 바꾼</h2>
              <h2 class="title title2">국정성과</h2>
            </div>
          </div>
        </div>
        <div class="cursor">
          <p>더보기<i class="iconArr"></i></p>
        </div>
      </section>
      <section class="sec sec2">
        <div class="container">
          <div class="innerWrap">
            <div class="titleArea">
              <h2 class="title">한눈에 보는 <b>전 부처 국정성과</b></h2>
              <p>25개 부처별 핵심 성과를 한눈에 쉽게!</p>
            </div>
            <div class="content">
              <span class="listCaption">ⓘ 부처명은 가나다 순임</span>
              <ul class="resultList">
                <li class="listItem">
                  <div class="accordionHead">
                    <div class="accordionHeadWrap">
                      <div class="accordionTitle">
                        <p class="team"><i class="iconNew"></i></p>
                        <h3 class="title"></h3>
                      </div>
                      <button class="accordionButton"></button>
                    </div>
                  </div>
                  <div class="accordionBody">
                    <div class="accordionBodyWrap">
                      <div class="accordionContent">
                        <div class="content">
                          <div class="thumb"><img src="" alt="" /></div>
                          <div class="titleArea">
                            <strong class="team"></strong>
                            <h5 class="title">
                              <span class="title1"></span>
                              <span class="title2"></span>
                            </h5>
                          </div>
                          <div class="textArea">
                            <p class="description"></p>
                            <p class="descriptionCaption"></p>
                          </div>
                        </div>
                        <div class="linkArea">
                          <a href=""
                            >부처 국정성과 더보기<i class="iconMore"></i
                          ></a>
                        </div>
                      </div>
                    </div>
                  </div>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="innerWrap">
        <address class="address">
          (30119) 세종특별자치시 갈매로 388 정부세종청사 15동 © 문화체육관광부
        </address>
        <div class="info">
          <dl>
            <dt>전화</dt>
            <dd>044-203-3555 (월~금 09:00~18:00, 공휴일 제외)</dd>
          </dl>
          <dl>
            <dt>팩스</dt>
            <dd>044-203-3488</dd>
          </dl>
          <dl>
            <dt>대표메일</dt>
            <dd>webmaster@korea.kr</dd>
          </dl>
        </div>
      </div>
    </footer>
  </body>
</html>
